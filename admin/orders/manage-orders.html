<!-- admin/orders/manage-orders.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Orders | AA Global Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/assets/css/style.css">
    <link rel="stylesheet" href="/assets/css/admin.css">
</head>
<body>
    <div class="admin-container">
        <aside class="admin-sidebar">
            <div class="admin-sidebar-header">
                <img src="/assets/images/logo/aa-global-logo.png" alt="AA Global" height="40">
                <h3>AA GLOBAL</h3>
                <p>Admin Panel</p>
            </div>
            <nav class="admin-nav">
                <a href="/admin/dashboard.html" class="admin-nav-item"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
                <a href="/admin/products/manage-products.html" class="admin-nav-item"><i class="fas fa-box"></i> Products</a>
                <a href="/admin/categories/manage-categories.html" class="admin-nav-item"><i class="fas fa-tags"></i> Categories</a>
                <a href="/admin/blog/manage-posts.html" class="admin-nav-item"><i class="fas fa-blog"></i> Blog Posts</a>
                <a href="/admin/banners/manage-banners.html" class="admin-nav-item"><i class="fas fa-image"></i> Banners</a>
                <a href="/admin/orders/manage-orders.html" class="admin-nav-item active"><i class="fas fa-shopping-cart"></i> Orders</a>
                <a href="#" id="logoutBtn" class="admin-nav-item"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </nav>
        </aside>
        
        <main class="admin-main">
            <div class="admin-header">
                <div class="admin-title">
                    <h1>Manage Orders</h1>
                    <p>View and process customer orders</p>
                </div>
                <div>
                    <select id="statusFilter" class="form-select">
                        <option value="all">All Orders</option>
                        <option value="pending">Pending</option>
                        <option value="processing">Processing</option>
                        <option value="shipped">Shipped</option>
                        <option value="delivered">Delivered</option>
                        <option value="cancelled">Cancelled</option>
                    </select>
                </div>
            </div>
            
            <div class="admin-content">
                <div class="data-table">
                    <table class="table">
                        <thead>
                            <tr><th>Order ID</th><th>Customer</th><th>Items</th><th>Total</th><th>Status</th><th>Date</th><th>Actions</th></tr>
                        </thead>
                        <tbody id="ordersTableBody">
                            <tr><td colspan="7" class="text-center">Loading orders...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
    
    <!-- Order Details Modal -->
    <div class="modal fade" id="orderModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Order Details</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="orderModalBody"></div>
                <div class="modal-footer">
                    <button type="button" class="btn-secondary" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="/firebase/firebase-config.js"></script>
    <script src="/firebase/auth.js"></script>
    <script src="/assets/js/main.js"></script>
    
    <script>
        let allOrders = [];
        
        async function loadOrders() {
            const tbody = document.getElementById('ordersTableBody');
            const filter = document.getElementById('statusFilter').value;
            
            try {
                let query = db.collection('orders').orderBy('createdAt', 'desc');
                const snapshot = await query.get();
                
                if (snapshot.empty) {
                    tbody.innerHTML = '<tr><td colspan="7" class="text-center">No orders found</td></tr>';
                    return;
                }
                
                allOrders = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                
                let filteredOrders = allOrders;
                if (filter !== 'all') {
                    filteredOrders = allOrders.filter(order => order.status === filter);
                }
                
                tbody.innerHTML = filteredOrders.map(order => `
                    <tr>
                        <td><code>#${order.id.slice(0, 8)}</code></td>
                        <td>
                            <strong>${order.customerName || 'Guest'}</strong><br>
                            <small>${order.customerPhone || 'N/A'}</small>
                        </td>
                        <td>${order.items?.length || 0} items</td>
                        <td><strong class="gold-text">₦${(order.total || 0).toLocaleString()}</strong></td>
                        <td>
                            <select class="status-select" data-id="${order.id}" onchange="updateStatus('${order.id}', this.value)">
                                <option value="pending" ${order.status === 'pending' ? 'selected' : ''}>Pending</option>
                                <option value="processing" ${order.status === 'processing' ? 'selected' : ''}>Processing</option>
                                <option value="shipped" ${order.status === 'shipped' ? 'selected' : ''}>Shipped</option>
                                <option value="delivered" ${order.status === 'delivered' ? 'selected' : ''}>Delivered</option>
                                <option value="cancelled" ${order.status === 'cancelled' ? 'selected' : ''}>Cancelled</option>
                            </select>
                        </td>
                        <td>${order.createdAt?.toDate().toLocaleDateString() || 'N/A'}</td>
                        <td>
                            <button class="btn btn-sm btn-info" onclick="viewOrder('${order.id}')"><i class="fas fa-eye"></i></button>
                            <button class="btn btn-sm btn-success" onclick="sendWhatsAppUpdate('${order.id}')"><i class="fab fa-whatsapp"></i></button>
                        </td>
                    </tr>
                `).join('');
            } catch (error) {
                console.error('Error loading orders:', error);
                tbody.innerHTML = '<tr><td colspan="7" class="text-center text-danger">Error loading orders</td></tr>';
            }
        }
        
        async function updateStatus(orderId, newStatus) {
            await db.collection('orders').doc(orderId).update({
                status: newStatus,
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            showNotification(`Order status updated to ${newStatus}`);
            loadOrders();
        }
        
        async function viewOrder(orderId) {
            const order = allOrders.find(o => o.id === orderId);
            if (!order) return;
            
            const modalBody = document.getElementById('orderModalBody');
            modalBody.innerHTML = `
                <div class="order-details">
                    <h6>Customer Information</h6>
                    <p><strong>Name:</strong> ${order.customerName || 'N/A'}<br>
                    <strong>Email:</strong> ${order.customerEmail || 'N/A'}<br>
                    <strong>Phone:</strong> ${order.customerPhone || 'N/A'}<br>
                    <strong>Address:</strong> ${order.address || 'N/A'}</p>
                    
                    <h6>Order Items</h6>
                    <div class="table-responsive">
                        <table class="table table-sm">
                            <thead><tr><th>Product</th><th>Quantity</th><th>Price</th><th>Total</th></tr></thead>
                            <tbody>
                                ${order.items?.map(item => `
                                    <tr>
                                        <td>${item.name}</td>
                                        <td>${item.quantity}</td>
                                        <td>₦${item.price?.toLocaleString()}</td>
                                        <td>₦${(item.price * item.quantity).toLocaleString()}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                    
                    <h6>Order Summary</h6>
                    <p><strong>Subtotal:</strong> ₦${(order.total || 0).toLocaleString()}<br>
                    <strong>Status:</strong> <span class="badge bg-${getStatusColor(order.status)}">${order.status}</span><br>
                    <strong>Order Date:</strong> ${order.createdAt?.toDate().toLocaleString()}</p>
                    
                    ${order.orderNotes ? `<h6>Notes</h6><p>${order.orderNotes}</p>` : ''}
                </div>
            `;
            
            new bootstrap.Modal(document.getElementById('orderModal')).show();
        }
        
        function getStatusColor(status) {
            const colors = { pending: 'warning', processing: 'info', shipped: 'primary', delivered: 'success', cancelled: 'danger' };
            return colors[status] || 'secondary';
        }
        
        function sendWhatsAppUpdate(orderId) {
            const order = allOrders.find(o => o.id === orderId);
            if (order && order.customerPhone) {
                const message = `Hello ${order.customerName || 'Customer'},\n\nYour order #${orderId.slice(0, 8)} status is now: ${order.status.toUpperCase()}\n\nThank you for shopping with AA Global Collections!\nLOOK EXPENSIVE. SPEND LESS.`;
                window.open(`https://wa.me/${order.customerPhone}?text=${encodeURIComponent(message)}`, '_blank');
            } else {
                showNotification('Customer phone number not available', 'error');
            }
        }
        
        document.getElementById('statusFilter').addEventListener('change', loadOrders);
        document.getElementById('logoutBtn')?.addEventListener('click', async (e) => {
            e.preventDefault();
            await adminLogout();
        });
        
        loadOrders();
    </script>
</body>
</html>
