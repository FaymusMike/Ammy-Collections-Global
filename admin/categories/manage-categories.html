<!-- admin/categories/manage-categories.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Categories | AA Global Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/assets/css/style.css">
    <link rel="stylesheet" href="/assets/css/admin.css">
</head>
<body>
    <div class="admin-container">
        <aside class="admin-sidebar">
            <div class="admin-sidebar-header">
                <img src="/assets/images/logo/aa-global-logo.png" alt="AA Global" height="40">
                <h3>AA GLOBAL</h3>
                <p>Admin Panel</p>
            </div>
            <nav class="admin-nav">
                <a href="/admin/dashboard.html" class="admin-nav-item"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
                <a href="/admin/products/manage-products.html" class="admin-nav-item"><i class="fas fa-box"></i> Products</a>
                <a href="/admin/categories/manage-categories.html" class="admin-nav-item active"><i class="fas fa-tags"></i> Categories</a>
                <a href="/admin/blog/manage-posts.html" class="admin-nav-item"><i class="fas fa-blog"></i> Blog Posts</a>
                <a href="/admin/banners/manage-banners.html" class="admin-nav-item"><i class="fas fa-image"></i> Banners</a>
                <a href="/admin/orders/manage-orders.html" class="admin-nav-item"><i class="fas fa-shopping-cart"></i> Orders</a>
                <a href="#" id="logoutBtn" class="admin-nav-item"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </nav>
        </aside>
        
        <main class="admin-main">
            <div class="admin-header">
                <div class="admin-title">
                    <h1>Manage Categories</h1>
                    <p>Add, edit, or remove product categories</p>
                </div>
                <button class="btn-gold" data-bs-toggle="modal" data-bs-target="#addCategoryModal">+ Add New Category</button>
            </div>
            
            <div class="admin-content">
                <div class="data-table">
                    <table class="table">
                        <thead>
                            <tr><th>Icon</th><th>Category Name</th><th>Product Count</th><th>Status</th><th>Actions</th></tr>
                        </thead>
                        <tbody id="categoriesTableBody">
                            <tr><td colspan="5" class="text-center">Loading categories...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
    
    <!-- Add Category Modal -->
    <div class="modal fade" id="addCategoryModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Add New Category</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="addCategoryForm">
                        <div class="mb-3">
                            <label>Category Name *</label>
                            <input type="text" id="categoryName" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label>Icon Class (Font Awesome)</label>
                            <input type="text" id="categoryIcon" class="form-control" placeholder="fa-tshirt">
                            <small class="text-muted">e.g., fa-tshirt, fa-laptop, fa-gem</small>
                        </div>
                        <div class="mb-3">
                            <label>Image URL</label>
                            <input type="url" id="categoryImage" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label>Description</label>
                            <textarea id="categoryDescription" class="form-control" rows="3"></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn-gold" onclick="addCategory()">Save Category</button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="/firebase/firebase-config.js"></script>
    <script src="/firebase/auth.js"></script>
    
    <script>
        let categories = [];
        
        async function loadCategories() {
            const tbody = document.getElementById('categoriesTableBody');
            try {
                const snapshot = await db.collection('categories').get();
                categories = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                
                if (categories.length === 0) {
                    // Demo categories
                    categories = [
                        { id: '1', name: 'Fashion', icon: 'fa-tshirt', productCount: 150 },
                        { id: '2', name: 'Electronics', icon: 'fa-laptop', productCount: 89 },
                        { id: '3', name: 'Jewelry', icon: 'fa-gem', productCount: 45 },
                        { id: '4', name: 'Home Appliances', icon: 'fa-blender', productCount: 67 }
                    ];
                }
                
                tbody.innerHTML = categories.map(cat => `
                    <tr>
                        <td><i class="fas ${cat.icon || 'fa-tag'}"></i></td>
                        <td><strong>${cat.name}</strong></td>
                        <td>${cat.productCount || 0}</td>
                        <td><span class="badge bg-success">Active</span></td>
                        <td>
                            <button class="btn btn-sm btn-warning" onclick="editCategory('${cat.id}')"><i class="fas fa-edit"></i></button>
                            <button class="btn btn-sm btn-danger" onclick="deleteCategory('${cat.id}')"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>
                `).join('');
            } catch (error) {
                console.error('Error loading categories:', error);
            }
        }
        
        async function addCategory() {
            const category = {
                name: document.getElementById('categoryName').value,
                icon: document.getElementById('categoryIcon').value || 'fa-tag',
                image: document.getElementById('categoryImage').value,
                description: document.getElementById('categoryDescription').value,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            };
            
            await db.collection('categories').add(category);
            bootstrap.Modal.getInstance(document.getElementById('addCategoryModal')).hide();
            document.getElementById('addCategoryForm').reset();
            loadCategories();
            alert('Category added successfully!');
        }
        
        async function deleteCategory(categoryId) {
            if (confirm('Are you sure you want to delete this category?')) {
                await db.collection('categories').doc(categoryId).delete();
                loadCategories();
            }
        }
        
        function editCategory(categoryId) {
            alert('Edit functionality: Open modal with category data for ID: ' + categoryId);
        }
        
        document.getElementById('logoutBtn')?.addEventListener('click', async (e) => {
            e.preventDefault();
            await adminLogout();
        });
        
        loadCategories();
    </script>
</body>
</html>
