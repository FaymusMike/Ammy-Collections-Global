<!-- admin/blog/manage-posts.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Blog Posts | AA Global Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/assets/css/style.css">
    <link rel="stylesheet" href="/assets/css/admin.css">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
</head>
<body>
    <div class="admin-container">
        <aside class="admin-sidebar">
            <div class="admin-sidebar-header">
                <img src="/assets/images/logo/aa-global-logo.png" alt="AA Global" height="40">
                <h3>AA GLOBAL</h3>
                <p>Admin Panel</p>
            </div>
            <nav class="admin-nav">
                <a href="/admin/dashboard.html" class="admin-nav-item"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
                <a href="/admin/products/manage-products.html" class="admin-nav-item"><i class="fas fa-box"></i> Products</a>
                <a href="/admin/categories/manage-categories.html" class="admin-nav-item"><i class="fas fa-tags"></i> Categories</a>
                <a href="/admin/blog/manage-posts.html" class="admin-nav-item active"><i class="fas fa-blog"></i> Blog Posts</a>
                <a href="/admin/banners/manage-banners.html" class="admin-nav-item"><i class="fas fa-image"></i> Banners</a>
                <a href="/admin/orders/manage-orders.html" class="admin-nav-item"><i class="fas fa-shopping-cart"></i> Orders</a>
                <a href="#" id="logoutBtn" class="admin-nav-item"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </nav>
        </aside>
        
        <main class="admin-main">
            <div class="admin-header">
                <div class="admin-title">
                    <h1>Manage Blog Posts</h1>
                    <p>Create, edit, or delete blog content</p>
                </div>
                <a href="/admin/blog/add-post.html" class="btn-gold">+ Write New Post</a>
            </div>
            
            <div class="admin-content">
                <div class="data-table">
                    <table class="table">
                        <thead>
                            <tr><th>Image</th><th>Title</th><th>Category</th><th>Date</th><th>Views</th><th>Status</th><th>Actions</th></tr>
                        </thead>
                        <tbody id="blogPostsTable">
                            <tr><td colspan="7" class="text-center">Loading posts...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
    <script src="/firebase/firebase-config.js"></script>
    <script src="/firebase/auth.js"></script>
    <script src="/assets/js/main.js"></script>
    
    <script>
        async function loadBlogPosts() {
            const tbody = document.getElementById('blogPostsTable');
            try {
                const snapshot = await db.collection('blog_posts').orderBy('createdAt', 'desc').get();
                
                if (snapshot.empty) {
                    tbody.innerHTML = '<tr><td colspan="7" class="text-center">No blog posts yet. <a href="add-post.html">Create your first post</a></td></tr>';
                    return;
                }
                
                tbody.innerHTML = snapshot.docs.map(doc => {
                    const post = doc.data();
                    return `
                        <tr>
                            <td><img src="${post.featuredImage || 'https://via.placeholder.com/50'}" width="50" height="50" style="object-fit:cover; border-radius:8px;"></td>
                            <td><strong>${post.title || 'Untitled'}</strong></td>
                            <td><span class="badge bg-info">${post.category || 'Uncategorized'}</span></td>
                            <td>${post.createdAt?.toDate().toLocaleDateString() || 'Recent'}</td>
                            <td>${post.views || 0}</td>
                            <td><span class="badge bg-success">Published</span></td>
                            <td>
                                <a href="edit-post.html?id=${doc.id}" class="btn btn-sm btn-warning"><i class="fas fa-edit"></i></a>
                                <button onclick="deletePost('${doc.id}')" class="btn btn-sm btn-danger"><i class="fas fa-trash"></i></button>
                            </td>
                        </tr>
                    `;
                }).join('');
            } catch (error) {
                console.error('Error loading posts:', error);
                tbody.innerHTML = '<tr><td colspan="7" class="text-center text-danger">Error loading posts</td></tr>';
            }
        }
        
        async function deletePost(postId) {
            if (confirm('Are you sure you want to delete this blog post? This action cannot be undone.')) {
                await db.collection('blog_posts').doc(postId).delete();
                loadBlogPosts();
                showNotification('Blog post deleted successfully');
            }
        }
        
        document.getElementById('logoutBtn')?.addEventListener('click', async (e) => {
            e.preventDefault();
            await adminLogout();
        });
        
        loadBlogPosts();
    </script>
</body>
</html>
