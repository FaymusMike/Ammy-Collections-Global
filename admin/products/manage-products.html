<!-- admin/products/manage-products.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Products | AA Global Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/assets/css/style.css">
    <link rel="stylesheet" href="/assets/css/admin.css">
</head>
<body>
    <div class="admin-container">
        <aside class="admin-sidebar">
            <div class="admin-sidebar-header">
                <h3>AA GLOBAL</h3>
                <p>Admin Panel</p>
            </div>
            <nav class="admin-nav">
                <a href="/admin/dashboard.html" class="admin-nav-item"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
                <a href="/admin/products/manage-products.html" class="admin-nav-item active"><i class="fas fa-box"></i> Products</a>
                <a href="/admin/categories/manage-categories.html" class="admin-nav-item"><i class="fas fa-tags"></i> Categories</a>
                <a href="/admin/blog/manage-posts.html" class="admin-nav-item"><i class="fas fa-blog"></i> Blog Posts</a>
                <a href="/admin/banners/manage-banners.html" class="admin-nav-item"><i class="fas fa-image"></i> Banners</a>
                <a href="/admin/orders/manage-orders.html" class="admin-nav-item"><i class="fas fa-shopping-cart"></i> Orders</a>
                <a href="#" id="logoutBtn" class="admin-nav-item"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </nav>
        </aside>
        
        <main class="admin-main">
            <div class="admin-header">
                <div class="admin-title">
                    <h1>Manage Products</h1>
                    <p>Add, edit, or remove products</p>
                </div>
                <a href="/admin/products/add-product.html" class="btn-gold">+ Add New Product</a>
            </div>
            
            <div class="admin-content">
                <div class="data-table">
                    <table class="table">
                        <thead>
                            <tr><th>Image</th><th>Name</th><th>Price</th><th>Category</th><th>Featured</th><th>Actions</th></tr>
                        </thead>
                        <tbody id="productsTableBody">
                            <tr><td colspan="6" class="text-center">Loading products...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="/firebase/firebase-config.js"></script>
    <script src="/firebase/auth.js"></script>
    <script src="/assets/js/main.js"></script>
    
    <script>
        async function loadProducts() {
            const tbody = document.getElementById('productsTableBody');
            try {
                const snapshot = await db.collection('products').get();
                if (snapshot.empty) {
                    tbody.innerHTML = '<tr><td colspan="6" class="text-center">No products found. <a href="add-product.html">Add your first product</a></td></tr>';
                    return;
                }
                tbody.innerHTML = snapshot.docs.map(doc => {
                    const product = doc.data();
                    return `
                        <tr>
                            <td><img src="${product.image || 'https://via.placeholder.com/50'}" width="50" height="50" style="object-fit:cover; border-radius:8px;"></td>
                            <td>${product.name || 'Untitled'}</td>
                            <td>₦${(product.price || 0).toLocaleString()}</td>
                            <td>${product.category || 'Uncategorized'}</td>
                            <td>${product.featured ? '<span class="badge bg-success">Yes</span>' : '<span class="badge bg-secondary">No</span>'}</td>
                            <td>
                                <a href="edit-product.html?id=${doc.id}" class="btn btn-sm btn-warning"><i class="fas fa-edit"></i></a>
                                <button onclick="deleteProduct('${doc.id}')" class="btn btn-sm btn-danger"><i class="fas fa-trash"></i></button>
                            </td>
                        </tr>
                    `;
                }).join('');
            } catch (error) {
                console.error('Error loading products:', error);
                tbody.innerHTML = '<tr><td colspan="6" class="text-center text-danger">Error loading products</td></tr>';
            }
        }
        
        async function deleteProduct(productId) {
            if (confirm('Are you sure you want to delete this product?')) {
                await db.collection('products').doc(productId).delete();
                loadProducts();
                showNotification('Product deleted successfully');
            }
        }
        
        document.getElementById('logoutBtn')?.addEventListener('click', async (e) => {
            e.preventDefault();
            await adminLogout();
        });
        
        loadProducts();
    </script>
</body>
</html>
