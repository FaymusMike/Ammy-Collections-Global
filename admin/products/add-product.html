<!-- admin/products/add-product.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Product | AA Global Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/assets/css/style.css">
    <link rel="stylesheet" href="/assets/css/admin.css">
</head>
<body>
    <div class="admin-container">
        <aside class="admin-sidebar">...</aside>
        <main class="admin-main">
            <div class="admin-header">
                <h1>Add New Product</h1>
            </div>
            <div class="admin-content">
                <form id="addProductForm">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label>Product Name *</label>
                            <input type="text" id="productName" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label>Price (₦) *</label>
                            <input type="number" id="productPrice" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label>Category *</label>
                            <select id="productCategory" class="form-control" required>
                                <option value="">Select Category</option>
                                <option>Fashion</option><option>Electronics</option><option>Jewelry</option>
                                <option>Home Appliances</option><option>Accessories</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label>Product Image URL</label>
                            <input type="url" id="productImage" class="form-control" placeholder="https://...">
                        </div>
                        <div class="col-12">
                            <label>Description</label>
                            <textarea id="productDescription" class="form-control" rows="4"></textarea>
                        </div>
                        <div class="col-12">
                            <div class="form-check">
                                <input type="checkbox" id="productFeatured" class="form-check-input">
                                <label class="form-check-label">Feature this product on homepage</label>
                            </div>
                        </div>
                        <div class="col-12">
                            <button type="submit" class="btn-gold">Save Product</button>
                            <a href="manage-products.html" class="btn-outline-gold">Cancel</a>
                        </div>
                    </div>
                </form>
            </div>
        </main>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="/firebase/firebase-config.js"></script>
    <script>
        document.getElementById('addProductForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const product = {
                name: document.getElementById('productName').value,
                price: parseFloat(document.getElementById('productPrice').value),
                category: document.getElementById('productCategory').value,
                image: document.getElementById('productImage').value || 'https://via.placeholder.com/300',
                description: document.getElementById('productDescription').value,
                featured: document.getElementById('productFeatured').checked,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            };
            await db.collection('products').add(product);
            alert('Product added successfully!');
            window.location.href = 'manage-products.html';
        });
    </script>
</body>
</html>
