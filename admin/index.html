<!-- /admin/index.html - Admin Login Page -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Ammy Collections Global</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/style.css">
    <link rel="stylesheet" href="/assets/css/admin.css">
</head>
<body style="background: linear-gradient(135deg, #000000, #1a1a1a); min-height: 100vh;">
    <div class="container">
        <div class="row justify-content-center align-items-center min-vh-100">
            <div class="col-md-5">
                <div class="admin-login-card">
                    <div class="text-center mb-4">
                        <h2 class="brand-gold">AMMY COLLECTIONS</h2>
                        <p class="text-white-50">Admin Portal</p>
                    </div>
                    
                    <form id="adminLoginForm">
                        <div class="mb-3">
                            <label class="form-label text-white">Email Address</label>
                            <input type="email" class="form-control" id="adminEmail" required placeholder="admin@ammycollections.com">
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-white">Password</label>
                            <input type="password" class="form-control" id="adminPassword" required placeholder="Enter your password">
                        </div>
                        <button type="submit" class="btn-gold w-100">Login <i class="fas fa-arrow-right"></i></button>
                    </form>
                    
                    <div class="text-center mt-4">
                        <a href="/" class="text-white-50 text-decoration-none">← Back to Website</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="/firebase/firebase-config.js"></script>
    <script src="/firebase/auth.js"></script>
    <script src="/assets/js/main.js"></script>
    
    <script>
        document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('adminEmail').value;
            const password = document.getElementById('adminPassword').value;
            
            const result = await adminLogin(email, password);
            if (!result.success) {
                alert(result.message);
            }
        });
    </script>
</body>
</html>
