<!-- /admin/dashboard.html - Admin Dashboard -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - AA Global Collections Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/style.css">
    <link rel="stylesheet" href="/assets/css/admin.css">
</head>
<body>
    <div class="admin-container">
        <!-- Sidebar -->
        <aside class="admin-sidebar">
            <div class="admin-sidebar-header">
                <h3>AA GLOBAL COLLECTIONS</h3>
                <p>Admin Dashboard</p>
            </div>
            <nav class="admin-nav">
                <a href="/admin/dashboard.html" class="admin-nav-item active">
                    <i class="fas fa-tachometer-alt"></i> Dashboard
                </a>
                <a href="/admin/products/manage-products.html" class="admin-nav-item">
                    <i class="fas fa-box"></i> Products
                </a>
                <a href="/admin/categories/manage-categories.html" class="admin-nav-item">
                    <i class="fas fa-tags"></i> Categories
                </a>
                <a href="/admin/blog/manage-posts.html" class="admin-nav-item">
                    <i class="fas fa-blog"></i> Blog Posts
                </a>
                <a href="/admin/banners/manage-banners.html" class="admin-nav-item">
                    <i class="fas fa-image"></i> Banners
                </a>
                <a href="/admin/orders/manage-orders.html" class="admin-nav-item">
                    <i class="fas fa-shopping-cart"></i> Orders
                </a>
                <a href="/admin/settings/general-settings.html" class="admin-nav-item">
                    <i class="fas fa-cog"></i> Settings
                </a>
                <a href="#" id="logoutBtn" class="admin-nav-item">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </a>
            </nav>
        </aside>
        
        <!-- Main Content -->
        <main class="admin-main">
            <div class="admin-header">
                <div class="admin-title">
                    <h1>Dashboard</h1>
                    <p>Welcome back, Admin</p>
                </div>
                <div class="admin-user">
                    <i class="fas fa-user-circle fa-2x"></i>
                    <span id="adminEmail"></span>
                </div>
            </div>
            
            <div class="admin-content">
                <div class="stat-cards">
                    <div class="stat-card">
                        <div class="stat-info">
                            <h3>Total Products</h3>
                            <div class="stat-number" id="totalProducts">0</div>
                        </div>
                        <div class="stat-icon">
                            <i class="fas fa-box"></i>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-info">
                            <h3>Total Categories</h3>
                            <div class="stat-number" id="totalCategories">0</div>
                        </div>
                        <div class="stat-icon">
                            <i class="fas fa-tags"></i>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-info">
                            <h3>Blog Posts</h3>
                            <div class="stat-number" id="totalPosts">0</div>
                        </div>
                        <div class="stat-icon">
                            <i class="fas fa-blog"></i>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-info">
                            <h3>Total Orders</h3>
                            <div class="stat-number" id="totalOrders">0</div>
                        </div>
                        <div class="stat-icon">
                            <i class="fas fa-shopping-cart"></i>
                        </div>
                    </div>
                </div>
                
                <div class="data-table">
                    <h3 class="p-3">Recent Orders</h3>
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Order ID</th>
                                <th>Customer</th>
                                <th>Amount</th>
                                <th>Status</th>
                                <th>Date</th>
                            </tr>
                        </thead>
                        <tbody id="recentOrders">
                            <tr>
                                <td colspan="5" class="text-center">Loading orders...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="/firebase/firebase-config.js"></script>
    <script src="/firebase/auth.js"></script>
    <script src="/firebase/firestore.js"></script>
    <script src="/assets/js/main.js"></script>
    
    <script>
        // Load dashboard statistics
        async function loadDashboardStats() {
            try {
                const products = await db.collection('products').get();
                document.getElementById('totalProducts').textContent = products.size;
                
                const categories = await db.collection('categories').get();
                document.getElementById('totalCategories').textContent = categories.size;
                
                const posts = await db.collection('blog_posts').get();
                document.getElementById('totalPosts').textContent = posts.size;
                
                const orders = await db.collection('orders').get();
                document.getElementById('totalOrders').textContent = orders.size;
                
                // Load recent orders
                const recentOrdersSnap = await db.collection('orders')
                    .orderBy('createdAt', 'desc')
                    .limit(5)
                    .get();
                    
                const tbody = document.getElementById('recentOrders');
                if (recentOrdersSnap.empty) {
                    tbody.innerHTML = '<tr><td colspan="5" class="text-center">No orders yet</td></tr>';
                } else {
                    tbody.innerHTML = recentOrdersSnap.docs.map(doc => {
                        const order = doc.data();
                        return `
                            <tr>
                                <td>#${doc.id.slice(0, 8)}</td>
                                <td>${order.customerName || 'Guest'}</td>
                                <td>₦${(order.total || 0).toLocaleString()}</td>
                                <td><span class="badge bg-warning">${order.status || 'pending'}</span></td>
                                <td>${order.createdAt?.toDate().toLocaleDateString() || 'N/A'}</td>
                            </tr>
                        `;
                    }).join('');
                }
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }
        
        // Set admin email
        auth.onAuthStateChanged((user) => {
            if (user) {
                document.getElementById('adminEmail').textContent = user.email;
                loadDashboardStats();
            }
        });
        
        // Logout
        document.getElementById('logoutBtn').addEventListener('click', async (e) => {
            e.preventDefault();
            await adminLogout();
        });
    </script>
</body>
</html>
